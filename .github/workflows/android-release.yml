name: Release Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5

      - name: Build App APKs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Rename Release APK
        run: |
          # The release APK is unsigned by default if no signing config is provided.
          # We rename it to make it clear and easy to find.
          cp android/app/build/outputs/apk/debug/app-debug.apk android/app-debug.apk
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk android/app-release-unsigned.apk
          elif [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk android/app-release.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            android/app-debug.apk
            android/app-release-unsigned.apk
            android/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
